text_cleaning:
  categorical_fields:
    occupation:
      strategy: "slug_title"
      overrides:
        not_in_workforce: "Not In Workforce"
        no_occupation: "No Occupation"
    education_level:
      strategy: "slug_title"
      overrides:
        9th_12th_no_diploma: "9th-12th, No Diploma"
        high_school: "High School"
        some_college: "Some College"
        bachelors: "Bachelor's Degree"
        graduate: "Graduate Degree"
    marital_status:
      strategy: "slug_title"
      overrides:
        married_present: "Married"
        never_married: "Never Married"
    bachelors_field:
      strategy: "slug_title"

filter_fields:
  - field: "age"
    type: "range"
    label: "Age Range"
    default_min: 18
    default_max: 70
  - field: "state"
    type: "multi-select-chips"
    label: "State"
  - field: "occupation"
    type: "dropdown"
    label: "Occupation"
  - field: "sex"
    type: "single-select-chips"
    label: "Gender"
  - field: "education_level"
    type: "dropdown"
    label: "Education"
  - field: "marital_status"
    type: "dropdown"
    label: "Marital Status"

filterable_columns:
  - field: "state"
    description: "US state or territory."
    type: "categorical"
  - field: "sex"
    description: "Sex of the person."
    type: "categorical"
  - field: "education_level"
    description: "Highest education level attained."
    type: "categorical"
  - field: "marital_status"
    description: "Marital status."
    type: "categorical"
  - field: "min_age"
    description: "Minimum age constraint."
    type: "range"
  - field: "max_age"
    description: "Maximum age constraint."
    type: "range"
  - field: "occupation"
    description: "Primary occupation."
    type: "categorical"

geo_json_path: "config/countries/usa_geo.json"
map_center: [39.8283, -98.5795]
map_zoom: 4

max_agents: 500
default_agents: 250
name_regex: "^([A-Z][a-z]+(?:\\s[A-Z][a-z]+){1,3})"

ui:
  cohort_dimensions:
    - key: "occupation"
      label: "Occupation"
      persona_field: "occupation"
    - key: "ageBucket"
      label: "Age"
      type: "age_bucket"
    - key: "geography"
      label: "Geography"
      type: "geography"
    - key: "sex"
      label: "Gender"
      persona_field: "sex"
    - key: "education_level"
      label: "Education"
      persona_field: "education_level"
    - key: "marital_status"
      label: "Marital Status"
      persona_field: "marital_status"
  tooltip_fields:
    - field: "occupation"
      label: "Occupation"
      section: "header"
    - field: "state"
      label: "State"
      section: "grid"
      type: "geography"
    - field: "city"
      label: "City"
      section: "grid"
    - field: "education_level"
      label: "Education"
      section: "grid"
    - field: "cultural_background"
      label: "Culture"
      section: "grid"
    - field: "marital_status"
      label: "Marital Status"
      section: "grid"
    - field: "bachelors_field"
      label: "Bachelors Field"
      section: "grid"
    - field: "income_bracket"
      label: "Income"
      section: "grid"
      fallback_fields: ["salary", "household_income"]
