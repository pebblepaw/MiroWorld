name: "United States"
code: "us"
flag_emoji: "🇺🇸"
dataset_path: "backend/data/nemotron/usa_nemotron_cc.parquet"
available: true

filter_fields:
  - field: "age"
    type: "range"
    label: "Age Range"
    default_min: 18
    default_max: 70
  - field: "state"
    type: "multi-select-chips"
    label: "State"
  - field: "occupation"
    type: "dropdown"
    label: "Occupation"
  - field: "gender"
    type: "single-select-chips"
    label: "Gender"
  - field: "ethnicity"
    type: "multi-select-chips"
    label: "Ethnicity"

filterable_columns:
  - field: "state"
    description: "US state or territory."
    type: "categorical"
  - field: "gender"
    description: "Gender of the person."
    type: "categorical"
  - field: "ethnicity"
    description: "Ethnicity or racial identity."
    type: "categorical"
  - field: "min_age"
    description: "Minimum age constraint."
    type: "range"
  - field: "max_age"
    description: "Maximum age constraint."
    type: "range"
  - field: "occupation"
    description: "Primary occupation."
    type: "categorical"

geo_json_path: "config/countries/usa_geo.json"
map_center: [39.8283, -98.5795]
map_zoom: 4

max_agents: 500
default_agents: 250
name_regex: "^([A-Z][a-z]+(?:\\s[A-Z][a-z]+){1,3})"
