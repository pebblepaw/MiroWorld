name: "United States"
code: "usa"
flag_emoji: "🇺🇸"
dataset_path: "backend/data/nemotron/usa/data/train-*.parquet"
available: true

dataset:
  local_paths:
    - "backend/data/nemotron/usa/data/train-*.parquet"
    - "backend/.cache/nemotron/data/train-*.parquet"
  download_dir: "backend/data/nemotron/usa"
  repo_id: "nvidia/Nemotron-Personas-USA"
  allow_patterns:
    - "data/train-*"
    - "README.md"
  required_columns:
    - "state"
  country_values:
    - "usa"
    - "us"
    - "united states"

