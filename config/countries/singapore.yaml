name: "Singapore"
code: "sg"
flag_emoji: "🇸🇬"
dataset_path: "backend/data/nemotron/singapore/data/train-*.parquet"
available: true

dataset:
  local_paths:
    - "backend/data/nemotron/singapore/data/train-*.parquet"
    - "backend/data/nemotron/data/train-*.parquet"
  download_dir: "backend/data/nemotron/singapore"
  repo_id: "nvidia/Nemotron-Personas-Singapore"
  allow_patterns:
    - "data/train-*"
    - "README.md"
  required_columns:
    - "planning_area"
  country_values:
    - "singapore"
    - "sg"

