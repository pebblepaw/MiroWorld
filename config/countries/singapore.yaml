name: "Singapore"
code: "sg"
flag_emoji: "🇸🇬"
dataset_path: "backend/data/nemotron/singapore_nemotron_cc.parquet"
available: true

filter_fields:
  - field: "age"
    type: "range"
    label: "Age Range"
    default_min: 20
    default_max: 65
  - field: "planning_area"
    type: "multi-select-chips"
    label: "Planning Area"
  - field: "occupation"
    type: "dropdown"
    label: "Occupation"
  - field: "gender"
    type: "single-select-chips"
    label: "Gender"

filterable_columns:
  - field: "planning_area"
    description: "Sub-region or planning area within Singapore."
    type: "categorical"
  - field: "sex"
    description: "Sex or gender of the person."
    type: "categorical"
  - field: "age_cohort"
    description: "Broad age grouping such as youth, adult, or senior."
    type: "categorical"
  - field: "min_age"
    description: "Minimum age constraint."
    type: "range"
  - field: "max_age"
    description: "Maximum age constraint."
    type: "range"
  - field: "education_level"
    description: "Highest education attainment."
    type: "categorical"
  - field: "marital_status"
    description: "Marital status of the person."
    type: "categorical"
  - field: "occupation"
    description: "Primary occupation."
    type: "categorical"
  - field: "industry"
    description: "Industry or employment sector."
    type: "categorical"
  - field: "hobby"
    description: "Hobbies or interests."
    type: "categorical"
  - field: "skill"
    description: "Skills or expertise."
    type: "categorical"

geo_json_path: "config/countries/singapore_geo.json"
map_center: [1.3521, 103.8198]
map_zoom: 11

max_agents: 500
default_agents: 250
name_regex: "^([A-Z][a-z]+(?:\\s[A-Z][a-z]+){1,3})"
