text_cleaning:
  categorical_fields:
    occupation:
      strategy: "preserve"
    education_level:
      strategy: "preserve"
    marital_status:
      strategy: "preserve"
    industry:
      strategy: "preserve"

filter_fields:
  - field: "age"
    type: "range"
    label: "Age Range"
    default_min: 20
    default_max: 65
  - field: "planning_area"
    type: "multi-select-chips"
    label: "Planning Area"
  - field: "occupation"
    type: "dropdown"
    label: "Occupation"
  - field: "gender"
    type: "single-select-chips"
    label: "Gender"

filterable_columns:
  - field: "planning_area"
    description: "Sub-region or planning area within Singapore."
    type: "categorical"
  - field: "sex"
    description: "Sex or gender of the person."
    type: "categorical"
  - field: "age_cohort"
    description: "Broad age grouping such as youth, adult, or senior."
    type: "categorical"
  - field: "min_age"
    description: "Minimum age constraint."
    type: "range"
  - field: "max_age"
    description: "Maximum age constraint."
    type: "range"
  - field: "education_level"
    description: "Highest education attainment."
    type: "categorical"
  - field: "marital_status"
    description: "Marital status of the person."
    type: "categorical"
  - field: "occupation"
    description: "Primary occupation."
    type: "categorical"
  - field: "industry"
    description: "Industry or employment sector."
    type: "categorical"
  - field: "hobby"
    description: "Hobbies or interests."
    type: "categorical"
  - field: "skill"
    description: "Skills or expertise."
    type: "categorical"

geo_json_path: "config/countries/singapore_geo.json"
map_center: [1.3521, 103.8198]
map_zoom: 11

max_agents: 500
default_agents: 250
name_regex: "^([A-Z][a-z]+(?:\\s[A-Z][a-z]+){1,3})"

ui:
  cohort_dimensions:
    - key: "industry"
      label: "Industry"
      persona_field: "industry"
    - key: "ageBucket"
      label: "Age"
      type: "age_bucket"
    - key: "geography"
      label: "Geography"
      type: "geography"
    - key: "occupation"
      label: "Occupation"
      persona_field: "occupation"
    - key: "sex"
      label: "Gender"
      persona_field: "sex"
  tooltip_fields:
    - field: "occupation"
      label: "Occupation"
      section: "header"
    - field: "planning_area"
      label: "Geography"
      section: "grid"
      type: "geography"
    - field: "education_level"
      label: "Education"
      section: "grid"
    - field: "industry"
      label: "Industry"
      section: "grid"
    - field: "cultural_background"
      label: "Culture"
      section: "grid"
    - field: "income_bracket"
      label: "Salary"
      section: "grid"
      fallback_fields: ["salary", "household_income"]
