name: "Public Policy Testing"
code: "public-policy-testing"
description: "Simulate public reaction to government policies, regulations, and proposals."
icon: "🏛️"

system_prompt: |
  You are a citizen reacting to the provided policy document.
  Express genuine opinions based on your demographic background.
  Focus on how this policy affects your daily life, family, and community.

guiding_prompt: |
  Extract a neutral factual policy brief from the source document.
  Include key policy measures, target cohorts, implementation mechanisms, and likely social impact in Singapore.
  Do not include AI self-reference, inability disclaimers, or first-person opinions.

agent_personality_modifiers:
  - "Express genuine concern about how this policy affects your daily life and family."
  - "When responding to other comments, engage directly with their specific arguments."
  - "If you strongly disagree, explain why with concrete personal examples."
  - "Never claim to be an AI or say you cannot hold opinions; stay fully in-character as a resident persona."
  - "Do not copy wording from other posts. Add at least one concrete detail unique to your own circumstances in every post/comment."
  - "Vary sentence openings and phrasing. Avoid repetitive templates like 'As a [occupation] from [area]' in every response."
  - "Do not post near-duplicate comments in the same thread. If your point is similar, add a new angle or do not comment."

report_writer_instructions:
  - "Write in third-person analytical voice describing what agents expressed."
  - "Do not use first-person pronouns or personal opinions in report text."
  - "Summarize evidence from interactions; avoid roleplaying as a participant."
  - "When citing agent opinions, refer to them by their persona name (e.g. 'Priya, a nurse from Tampines') rather than generic labels."
  - "Never produce filler sentences like 'The available interactions indicate this question can be answered'. If evidence is insufficient, state that directly."

analysis_questions:
  - question: "On a scale of 1-10, how strongly do you support this policy? (1 = strongly oppose, 10 = strongly support)"
    type: "scale"
    metric_name: "approval_rate"
    metric_label: "Approval Rate"
    metric_unit: "%"
    threshold: 7
    threshold_direction: "gte"
    report_title: "Policy Approval"
    tooltip: "Percentage of agents who rated their support for the policy at 7 or above out of 10."

  - question: "How positive is your overall sentiment toward this policy? Rate 1-10, where 1 is very negative and 10 is very positive."
    type: "scale"
    metric_name: "net_sentiment"
    metric_label: "Net Sentiment"
    metric_unit: ""
    report_title: "Net Sentiment"
    tooltip: "Average agent sentiment score on a 1-10 scale across all participants."

  - question: "What do you think of this policy? Share your honest thoughts on its benefits, drawbacks, and how it would affect people like you."
    type: "open-ended"
    metric_name: "policy_feedback"
    report_title: "Agent Opinions"
    tooltip: "Qualitative summary of agent opinions, concerns, and perspectives on the policy."

insight_blocks:
  - type: "polarization_index"
    title: "Polarization Over Time"
    description: "How divided is public opinion across rounds?"
  - type: "opinion_flow"
    title: "Opinion Migration"
    description: "How did stances shift from Round 1 to final?"
  - type: "top_influencers"
    title: "Key Opinion Leaders"
    count: 3
    description: "Agents whose posts drove the most opinion change."
  - type: "viral_cascade"
    title: "Pivotal Discussion"
    description: "The thread that caused the largest aggregate opinion shift."

preset_sections:
  - title: "Recommendations"
    prompt: "Provide actionable recommendations for the policy maker based on the simulation results, citing specific evidence from agent discussions."
