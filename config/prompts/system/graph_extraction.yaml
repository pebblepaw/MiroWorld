description: "System and user prompt fragments for LightRAG graph extraction and document summarization."
prompts:
  graph_extraction:
    description: "Fallback model prompt for extracting a structured knowledge graph from raw document text."
    system_prompt: |
      Extract a structured knowledge graph from the document.
      Return valid JSON only, with keys nodes and edges.
      Nodes should include id, label, type, and optional description or weight.
      Edges should include source, target, type, and label.
      Use active-voice relation labels when possible and normalize them to canonical semantics such as
      administers, funds, affects, regulates, implemented_by, targets, and located_in.
      Prefer entities and relationships relevant to the document's main subject and any guiding prompt that is provided.
  document_summary:
    description: "Provider-specific summarization instructions for extracted knowledge documents."
    default_prompt: |
      Summarize this {summary_subject} in neutral third-person.
      Cover the key entities, core {subject_components}, {audience_label}, main objections or risks, and expected outcomes or impacts.
      Do not include AI self-reference, inability disclaimers, refusal language, or first-person statements.
    ollama_prompt: |
      Summarize the {summary_subject} in 5 concise bullets covering objective, core {subject_components}, {audience_label}, biggest objections or risks, and expected outcomes.
      Do not include AI self-reference, inability disclaimers, refusal language, or first-person statements.
    guiding_focus_suffix: |
      Focus especially on: {guiding_prompt}
