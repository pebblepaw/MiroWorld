name: "Product & Market Research"
code: "product-market-research"
description: "Evaluate product-market fit, customer satisfaction, and improvement priorities."
icon: "📦"

system_prompt: |
  You are evaluating the provided product or service concept.
  React based on your real habits, needs, and pain points.
  Be honest about whether you would use, pay for, or recommend this.

guiding_prompt: |
  Extract a neutral factual brief from the source content.
  Accept product pages, launch posts, reviews, comparisons, feature announcements, and product news when they contain concrete product or service detail.
  Identify the concrete product or service details, target users, pain points, objections, and evidence-backed opportunities.
  Do not include AI self-reference, inability disclaimers, or first-person opinions.

prompt_terms:
  summary_label: "Product summary"
  summary_subject: "product or service source"
  subject_components: "product details, features, pricing, and use cases"
  audience_label: "target users"
  evaluation_target: "the product or service"

summary_validation:
  required_patterns:
    - "\\b(product|service|app|platform|device|software|hardware|tool|feature|features|pricing|subscription|price|launch|review|comparison|customer|user|buyer|electronics?)\\b"
    - "\\b(camera|battery|display|chip|spec|specs|plan|tier|workflow|dashboard|automation|creator|mobile|laptop|phone|wearable)\\b"
  invalid_summary_detail: "Knowledge extraction did not produce a usable summary for simulation. This source needs at least one concrete product or service detail. Re-run Screen 1 with a clearer source or guiding prompt before starting Screen 3."

agent_personality_modifiers:
  - "Evaluate this product based on your actual daily habits and pain points."
  - "Be direct about willingness to use or pay for this."
  - "Compare against alternatives you already use."
  - "Include specific details about what worked and what didn't."
  - "When responding to other comments, engage directly with their specific arguments."
  - "If you strongly disagree, explain why with concrete personal examples."
  - "Never claim to be an AI or say you cannot hold opinions; stay fully in-character as a resident persona."
  - "Do not copy wording from other posts. Add at least one concrete detail unique to your own circumstances in every post/comment."
  - "Vary sentence openings and phrasing. Avoid repetitive templates like 'As a [occupation] from [area]' in every response."
  - "Do not post near-duplicate comments in the same thread. If your point is similar, add a new angle or do not comment."

report_writer_instructions:
  - "Write in third-person analytical voice describing what participants expressed."
  - "Do not use first-person pronouns or personal opinions in report text."
  - "Ground each section in evidence from interactions and metrics."
  -  "Summarize evidence from interactions; avoid roleplaying as a participant."
  - "When citing agent opinions, refer to them by their persona name (e.g. 'Priya, a nurse from Tampines'), strictly do not refer to them by their agent ID such as Agent 2 or sgagent2."
  - "Never produce filler sentences like 'The available interactions indicate this question can be answered'. If evidence is insufficient, state that directly."

analysis_questions:
  - question: "How interested are you in this product? Rate 1-10."
    type: "scale"
    metric_name: "product_interest"
    metric_label: "Product Interest"
    metric_unit: "%"
    threshold: 7
    threshold_direction: "gte"
    report_title: "Product Interest"
    tooltip: "Percentage of agents who rated interest ≥ 7/10."

  - question: "Would you recommend this to a friend? Rate 1-10."
    type: "scale"
    metric_name: "nps_score"
    metric_label: "NPS (Promoters)"
    metric_unit: "%"
    threshold: 8
    threshold_direction: "gte"
    report_title: "Net Promoter Score"
    tooltip: "Percentage of agents who would recommend (score ≥ 8), following NPS methodology."

  - question: "What are the main pain points or problems you see with this product?"
    type: "open-ended"
    metric_name: "pain_points"
    report_title: "Pain Points"
    tooltip: "Top pain points and unmet needs raised by agents."

insight_blocks:
  - type: "segment_heatmap"
    title: "Best-Fit Segments"
    description: "Which demographic segments show highest interest/satisfaction?"
    metric_ref: "product_interest"
  - type: "top_advocates"
    title: "Top Advocates"
    count: 3
    description: "Agents with the highest scores — your ideal customer profile."

preset_sections:
  - title: "Best-Fit Demographics"
    prompt: "Analyze which demographic segments (age, occupation, income, location) are the best fit for this product based on interest scores, feedback sentiment, and NPS. State the ideal customer profile clearly."
  - title: "Top Recommendations"
    prompt: "Recommend prioritized product improvements based on complaint frequency, severity, and which segments they affect most."
