name: Deploy to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'config/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-aws.yml'
  workflow_dispatch:

concurrency:
  group: deploy-aws-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_BACKEND: 050751893720.dkr.ecr.us-east-1.amazonaws.com/miroworld/backend
  ECR_FRONTEND: 050751893720.dkr.ecr.us-east-1.amazonaws.com/miroworld/frontend
  ECS_CLUSTER: miroworld-cluster
  ECS_SERVICE: miroworld-backend
  ECS_BACKEND_CONTAINER: backend
  ECS_EXECUTION_ROLE: miroworld-ecs-execution-role
  S3_FRONTEND_BUCKET: miroworld-frontend-prod
  CLOUDFRONT_DISTRIBUTION_ID: E3LWVUPHQA8GK2
  CLOUDFRONT_DOMAIN: d3a03mb192176l.cloudfront.net
  GEMINI_PARAM: /miroworld/backend/GEMINI_API
  HUGGINGFACE_PARAM: /miroworld/backend/HUGGINGFACE_API_KEY

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        run: |
          docker build -f backend/Dockerfile \
            -t $ECR_BACKEND:${{ github.sha }} \
            -t $ECR_BACKEND:latest .
          docker push $ECR_BACKEND:${{ github.sha }}
          docker push $ECR_BACKEND:latest

      - name: Build & push frontend image
        working-directory: frontend
        run: |
          docker build --target production \
            --build-arg VITE_API_BASE=https://${{ env.CLOUDFRONT_DOMAIN }} \
            --build-arg VITE_BOOT_MODE=live \
            -t $ECR_FRONTEND:${{ github.sha }} \
            -t $ECR_FRONTEND:latest .
          docker push $ECR_FRONTEND:${{ github.sha }}
          docker push $ECR_FRONTEND:latest

      - name: Sync backend runtime secrets to SSM
        env:
          GEMINI_API: ${{ secrets.GEMINI_API }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        run: |
          : "${GEMINI_API:?Missing GitHub secret GEMINI_API}"
          : "${HUGGINGFACE_API_KEY:?Missing GitHub secret HUGGINGFACE_API_KEY}"

          aws ssm put-parameter \
            --name "$GEMINI_PARAM" \
            --type SecureString \
            --value "$GEMINI_API" \
            --overwrite

          aws ssm put-parameter \
            --name "$HUGGINGFACE_PARAM" \
            --type SecureString \
            --value "$HUGGINGFACE_API_KEY" \
            --overwrite

      - name: Grant ECS execution role access to runtime secrets
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)

          cat > ecs-runtime-secrets-policy.json <<EOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": [
                  "ssm:GetParameter",
                  "ssm:GetParameters"
                ],
                "Resource": [
                  "arn:aws:ssm:${AWS_REGION}:${AWS_ACCOUNT_ID}:parameter${GEMINI_PARAM}",
                  "arn:aws:ssm:${AWS_REGION}:${AWS_ACCOUNT_ID}:parameter${HUGGINGFACE_PARAM}"
                ]
              },
              {
                "Effect": "Allow",
                "Action": "kms:Decrypt",
                "Resource": "*",
                "Condition": {
                  "StringEquals": {
                    "kms:ViaService": "ssm.${AWS_REGION}.amazonaws.com"
                  }
                }
              }
            ]
          }
          EOF

          aws iam put-role-policy \
            --role-name $ECS_EXECUTION_ROLE \
            --policy-name miroworld-ssm-runtime-secrets \
            --policy-document file://ecs-runtime-secrets-policy.json

      - name: Register backend task definition revision
        id: backend-task-def
        run: |
          CURRENT_TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --query 'services[0].taskDefinition' \
            --output text \
            --region $AWS_REGION)

          aws ecs describe-task-definition \
            --task-definition "$CURRENT_TASK_DEF_ARN" \
            --query 'taskDefinition' \
            --output json \
            --region $AWS_REGION > task-def-source.json

          python - <<'PY'
          import json
          import os

          allowed_keys = [
              "family",
              "taskRoleArn",
              "executionRoleArn",
              "networkMode",
              "containerDefinitions",
              "volumes",
              "placementConstraints",
              "requiresCompatibilities",
              "cpu",
              "memory",
              "tags",
              "pidMode",
              "ipcMode",
              "proxyConfiguration",
              "inferenceAccelerators",
              "ephemeralStorage",
              "runtimePlatform",
          ]
          secret_names = {
              "GEMINI_API": os.environ["GEMINI_PARAM"],
              "HUGGINGFACE_API_KEY": os.environ["HUGGINGFACE_PARAM"],
          }
          with open("task-def-source.json", encoding="utf-8") as handle:
              source = json.load(handle)

          task_def = {key: source[key] for key in allowed_keys if key in source}
          container_name = os.environ["ECS_BACKEND_CONTAINER"]
          backend_image = f"{os.environ['ECR_BACKEND']}:{os.environ['GITHUB_SHA']}"

          for container in task_def.get("containerDefinitions", []):
              if container.get("name") != container_name:
                  continue
              container["image"] = backend_image

              current_env = {
                  item["name"]: item["value"]
                  for item in container.get("environment", [])
                  if item.get("name") not in secret_names
              }
              container["environment"] = [
                  {"name": name, "value": value}
                  for name, value in sorted(current_env.items())
              ]

              current_secrets = {
                  item["name"]: item["valueFrom"]
                  for item in container.get("secrets", [])
              }
              current_secrets.update(secret_names)
              container["secrets"] = [
                  {"name": name, "valueFrom": value_from}
                  for name, value_from in sorted(current_secrets.items())
              ]

          with open("task-def.json", "w", encoding="utf-8") as handle:
              json.dump(task_def, handle)
          PY

          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text \
            --region $AWS_REGION)

          echo "task_definition_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition ${{ steps.backend-task-def.outputs.task_definition_arn }} \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Deploy frontend to S3
        run: |
          # Extract built files from frontend image
          CONTAINER_ID=$(docker create $ECR_FRONTEND:${{ github.sha }})
          docker cp $CONTAINER_ID:/usr/share/nginx/html ./frontend-dist
          docker rm $CONTAINER_ID

          # Sync to S3
          aws s3 sync ./frontend-dist s3://$S3_FRONTEND_BUCKET \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.json"

          # Upload index.html and JSON with no-cache
          aws s3 cp ./frontend-dist/index.html s3://$S3_FRONTEND_BUCKET/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

          find ./frontend-dist -name '*.json' -exec sh -c \
            'aws s3 cp "$1" "s3://'"$S3_FRONTEND_BUCKET"'/$(echo "$1" | sed "s|^./frontend-dist/||")" --cache-control "no-cache"' _ {} \;

      - name: Invalidate CloudFront cache
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/index.html" "/*.json" "/assets/*"

      - name: Wait for ECS deployment
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION
          echo "Deployment complete!"

      - name: Warm Singapore dataset
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.request

          base_url = f"https://{os.environ['CLOUDFRONT_DOMAIN']}"
          country = "singapore"

          def fetch_json(path: str, *, method: str = "GET") -> dict:
              request = urllib.request.Request(f"{base_url}{path}", method=method)
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      return json.load(response)
              except urllib.error.HTTPError as exc:
                  raw_body = exc.read().decode("utf-8", errors="ignore")
                  try:
                      detail = json.loads(raw_body)
                  except json.JSONDecodeError:
                      detail = raw_body or exc.reason
                  raise SystemExit(f"Request failed for {path}: {detail}") from exc

          status = fetch_json(f"/api/v2/countries/{country}/download-status")
          if not status.get("dataset_ready"):
              fetch_json(f"/api/v2/countries/{country}/download", method="POST")

          deadline = time.time() + 900
          while time.time() < deadline:
              status = fetch_json(f"/api/v2/countries/{country}/download-status")
              if status.get("dataset_ready"):
                  print(json.dumps(status, indent=2))
                  sys.exit(0)
              if status.get("download_status") == "error":
                  raise SystemExit(f"Dataset warm-up failed: {status.get('download_error') or status}")
              time.sleep(5)

          raise SystemExit(f"Dataset warm-up timed out: {status}")
          PY
