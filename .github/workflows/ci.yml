name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        run: python -m pip install -U pip && python -m pip install -e .[dev]

      - name: Check shell syntax
        run: bash -n ../quick_start.sh

      - name: Lint backend
        run: python -m ruff check src

      - name: Compile backend sources
        run: python -m compileall src

      - name: Run backend tests if present
        run: |
          if [[ -d tests ]] && find tests -name 'test_*.py' -print -quit | grep -q .; then
            python -m pytest -q tests
          else
            echo "No backend pytest files are tracked yet."
          fi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test -- --run

      - name: Build frontend
        run: npm run build

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare example environment
        run: cp .env.example .env

      - name: Build and start stack
        run: docker compose up --build -d

      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs backend oasis-sidecar
          exit 1

      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:5173/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs frontend
          exit 1

      - name: Stop stack
        if: always()
        run: docker compose down -v
