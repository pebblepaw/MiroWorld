name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        run: python -m pip install -U pip && python -m pip install -e .[dev]

      - name: Check shell syntax
        run: bash -n ../quick_start.sh

      - name: Lint backend
        run: python -m ruff check src

      - name: Compile backend sources
        run: python -m compileall src

      - name: Run backend tests if present
        run: |
          if [[ -d tests ]] && find tests -name 'test_*.py' -print -quit | grep -q .; then
            python -m pytest -q tests
          else
            echo "No backend pytest files are tracked yet."
          fi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test -- --run

      - name: Build frontend
        run: npm run build
