version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
        VITE_BOOT_MODE: ${BOOT_MODE:-demo}
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mckainsey

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OASIS_SIDECAR_HOST: oasis-sidecar
      OASIS_SIDECAR_PORT: "8001"
    depends_on:
      oasis-sidecar:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS http://localhost:8000/health >/dev/null &&
          python -c "import urllib.request; urllib.request.urlopen('http://oasis-sidecar:8001/health', timeout=2).read()" >/dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backend_data:/app/backend/data
    networks:
      - mckainsey

  oasis-sidecar:
    build:
      context: .
      dockerfile: backend/Dockerfile.oasis
    ports:
      - "8001:8001"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2).read()
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - mckainsey

networks:
  mckainsey:
    driver: bridge

volumes:
  backend_data:
