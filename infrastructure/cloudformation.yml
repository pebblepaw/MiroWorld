AWSTemplateFormatVersion: '2010-09-09'
Description: MiroWorld Cloud Hosting MVP - ECS Fargate + ALB + S3/CloudFront

Parameters:
  ProjectName:
    Type: String
    Default: miroworld
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging]
  BackendImage:
    Type: String
    Description: Backend ECR image URI (e.g. 050751893720.dkr.ecr.us-east-1.amazonaws.com/miroworld/backend:latest)
  FrontendBucketName:
    Type: String
    Default: miroworld-frontend-prod
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
  BackendCpu:
    Type: Number
    Default: 512
  BackendMemory:
    Type: Number
    Default: 1024
  BackendDesiredCount:
    Type: Number
    Default: 1
  GeminiParamName:
    Type: String
    Default: /miroworld/backend/GEMINI_API
  HuggingFaceParamName:
    Type: String
    Default: /miroworld/backend/HUGGINGFACE_API_KEY
  SupabaseUrlParamName:
    Type: String
    Default: ''
  SupabaseApiUrlParamName:
    Type: String
    Default: ''
  SupabasePublishableKeyParamName:
    Type: String
    Default: ''
  SupabaseServiceRoleKeyParamName:
    Type: String
    Default: ''
  SupabaseScretKeyParamName:
    Type: String
    Default: ''
  SupabasePostgresUrlParamName:
    Type: String
    Default: ''
  ZepCloudParamName:
    Type: String
    Default: ''

Conditions:
  IsStaging: !Equals [!Ref Environment, 'staging']
  HasHuggingFaceParam: !Not [!Equals [!Ref HuggingFaceParamName, '']]
  HasSupabaseUrlParam: !Not [!Equals [!Ref SupabaseUrlParamName, '']]
  HasSupabaseApiUrlParam: !Not [!Equals [!Ref SupabaseApiUrlParamName, '']]
  HasSupabasePublishableKeyParam: !Not [!Equals [!Ref SupabasePublishableKeyParamName, '']]
  HasSupabaseServiceRoleKeyParam: !Not [!Equals [!Ref SupabaseServiceRoleKeyParamName, '']]
  HasSupabaseScretKeyParam: !Not [!Equals [!Ref SupabaseScretKeyParamName, '']]
  HasSupabasePostgresUrlParam: !Not [!Equals [!Ref SupabasePostgresUrlParamName, '']]
  HasZepCloudParam: !Not [!Equals [!Ref ZepCloudParamName, '']]

Resources:
  # === VPC =========================================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-igw

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # === Security Groups =============================================
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB - allow HTTP/HTTPS from anywhere
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-alb-sg

  BackendSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Backend ECS tasks - allow from ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-backend-sg

  # === ALB ========================================================
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-backend-tg
      Port: 8000
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  # === ECS Cluster =================================================
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${ProjectName}-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # === IAM Roles ===================================================
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-ecs-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: RuntimeSecretAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: '*'
              - Effect: Allow
                Action: kms:Decrypt
                Resource: '*'
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub ssm.${AWS::Region}.amazonaws.com

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-ecs-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3UploadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub arn:aws:s3:::${FrontendBucketName}-uploads/*

  # === CloudWatch Log Group ========================================
  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}/backend
      RetentionInDays: 14

  # === ECS Task Definition =========================================
  BackendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-backend
      Cpu: !Ref BackendCpu
      Memory: !Ref BackendMemory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: backend
          Image: !Ref BackendImage
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          Environment:
            - Name: PYTHONPATH
              Value: src
            - Name: APP_STATE_BACKEND
              Value: !If [IsStaging, postgres, sqlite]
            - Name: HOSTED_AUTH_REQUIRED
              Value: !If [IsStaging, 'true', 'false']
            - Name: LLM_PROVIDER
              Value: google
            - Name: LLM_MODEL
              Value: gemini-2.5-flash-lite
            - Name: LLM_EMBED_MODEL
              Value: gemini-embedding-001
            - Name: LLM_BASE_URL
              Value: https://generativelanguage.googleapis.com/v1beta/openai/
          Secrets:
            - Name: GEMINI_API
              ValueFrom: !Ref GeminiParamName
            - Name: LLM_API_KEY
              ValueFrom: !Ref GeminiParamName
            - !If
              - HasHuggingFaceParam
              - Name: HUGGINGFACE_API_KEY
                ValueFrom: !Ref HuggingFaceParamName
              - !Ref AWS::NoValue
            - !If
              - HasSupabaseUrlParam
              - Name: SUPABASE_URL
                ValueFrom: !Ref SupabaseUrlParamName
              - !Ref AWS::NoValue
            - !If
              - HasSupabaseApiUrlParam
              - Name: SUPABASE_API_URL
                ValueFrom: !Ref SupabaseApiUrlParamName
              - !Ref AWS::NoValue
            - !If
              - HasSupabasePublishableKeyParam
              - Name: SUPABASE_PUBLISHABLE_KEY
                ValueFrom: !Ref SupabasePublishableKeyParamName
              - !Ref AWS::NoValue
            - !If
              - HasSupabaseServiceRoleKeyParam
              - Name: SUPABASE_SERVICE_ROLE_KEY
                ValueFrom: !Ref SupabaseServiceRoleKeyParamName
              - !Ref AWS::NoValue
            - !If
              - HasSupabaseScretKeyParam
              - Name: SUPABASE_SCRET_KEY
                ValueFrom: !Ref SupabaseScretKeyParamName
              - !Ref AWS::NoValue
            - !If
              - HasSupabasePostgresUrlParam
              - Name: SUPABASE_POSTGRES_URL
                ValueFrom: !Ref SupabasePostgresUrlParamName
              - !Ref AWS::NoValue
            - !If
              - HasZepCloudParam
              - Name: ZEP_CLOUD
                ValueFrom: !Ref ZepCloudParamName
              - !Ref AWS::NoValue
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref BackendLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: backend
          HealthCheck:
            Command: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 15

  # === ECS Service =================================================
  BackendService:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      ServiceName: !Sub ${ProjectName}-backend
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref BackendTaskDefinition
      DesiredCount: !Ref BackendDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          SecurityGroups:
            - !Ref BackendSecurityGroup
      LoadBalancers:
        - ContainerName: backend
          ContainerPort: 8000
          TargetGroupArn: !Ref BackendTargetGroup

  # === S3 + CloudFront for Frontend ================================
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref FrontendBucketName
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${ProjectName}-frontend-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
          - Id: ALBOrigin
            DomainName: !GetAtt ALB.DNSName
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
              HTTPPort: 80
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          Compress: true
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ALBOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
            CachedMethods: [GET, HEAD]
            ForwardedValues:
              QueryString: true
              Headers: ['*']
              Cookies:
                Forward: all
            DefaultTTL: 0
            MinTTL: 0
            MaxTTL: 0
          - PathPattern: /health
            TargetOriginId: ALBOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
            DefaultTTL: 0
            MinTTL: 0
            MaxTTL: 0
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
        Comment: !Sub ${ProjectName} frontend CDN
        PriceClass: PriceClass_100

Outputs:
  ALBDNSName:
    Description: Backend ALB DNS
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub ${ProjectName}-alb-dns

  CloudFrontDomain:
    Description: Frontend CloudFront domain
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub ${ProjectName}-cloudfront-domain

  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub ${ProjectName}-cloudfront-id

  ECSClusterName:
    Description: ECS cluster name
    Value: !Ref ECSCluster

  BackendServiceName:
    Description: ECS backend service name
    Value: !GetAtt BackendService.Name

  FrontendBucketName:
    Description: S3 bucket for frontend
    Value: !Ref FrontendBucket
